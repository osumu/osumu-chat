<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            background: #f8f9fa;
            padding: 20px;
        }

        #chat {
            height: 400px;
            overflow-y: auto;
            background: #fff;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card p-3">
            <div class="d-flex justify-content-between">
                <h4><i class="bi bi-chat"></i> チャット</h4>
                <button class="btn btn-sm btn-outline-danger" onclick="logout()">ログアウト</button>
            </div>

            <div id="chat" class="mt-3"></div>

            <div class="input-group mt-2">
                <input id="msgInput" class="form-control" placeholder="メッセージ">
                <button class="btn btn-success" onclick="sendMessage()">送信</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>

</html>
