<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/@melloware/coloris/dist/coloris.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@melloware/coloris/dist/coloris.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/jquery-emoji-picker@0.2.2/css/jquery.emojipicker.tw.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery-emoji-picker@0.2.2/js/jquery.emojis.min.js"></script>

    <style>
        body {
            background: #f5f5f5;
        }

        .hidden {
            display: none;
        }

        /* ===== リスト ===== */
        .chat-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        .chat-item:hover {
            background: #eee;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ccc;
        }

        .name {
            font-weight: bold;
        }

        .preview {
            font-size: 12px;
            color: gray;
        }

        /* ===== チャット ===== */
        .bubble {
            padding: 8px 12px;
            margin: 4px;
            border-radius: 15px;
            max-width: 70%;
        }

        .me {
            background: var(--accent, #06c755);
            color: white;
            margin-left: auto;
        }

        .them {
            background: white;
        }

        .square {
            border-radius: 5px !important;
        }

        /* ===== フル画面 ===== */
        .full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
        }
    </style>
</head>

<body>

    <!-- ================= 一覧 ================= -->
    <div id="listPage" class="container mt-3">

        <div class="d-flex justify-content-between align-items-center">
            <button class="btn btn-outline-danger" onclick="logout()">
                <i class="bi bi-arrow-bar-left"></i>
            </button>
            <h1>チャット</h1>
            <i class="bi bi-plus" onclick="openAdd()"></i>
        </div>


        <div class="input-group mb-2">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input class="form-control">
        </div>

        <div id="chatList"></div>

        <div id="empty" class="text-center mt-5 text-muted">
            まだ相手がいません。右上の追加ボタンで話し相手を追加しましょう。
        </div>

    </div>

    <!-- ================= 追加 ================= -->
    <div id="addModal" class="hidden full p-3">

        <div class="d-flex justify-content-between">
            <div></div>
            <i class="bi bi-x" onclick="closeAdd()" style="font-size: 30px; cursor: pointer;"></i>
        </div>

        <h1>追加</h1>

        <p>PINコードを入力</p>
        <input id="pinInput" class="form-control">
        <button class="btn btn-primary mt-2 w-100" onclick="addByPIN()">追加</button>

        <p class="mt-2">もしくは</p>
        <button class="btn btn-secondary" onclick="openScan()">QRコードを読み込み</button>

    </div>

    <!-- ================= QR ================= -->
    <div id="scanPage" class="hidden full p-3">

        <i class="bi bi-arrow-left" onclick="backAdd()" style="font-size: 30px; cursor: pointer;"></i>
        <h1>読み込み</h1>

        <video id="camera" autoplay style="width:100%"></video>

    </div>

    <!-- ================= チャット ================= -->
    <div id="chatPage" class="hidden full">

        <div class="d-flex justify-content-between p-2">
            <div>
                <i class="bi bi-arrow-left" onclick="backList()"></i>
                <span id="roomName"></span>
            </div>
            <i class="bi bi-gear" onclick="openSettings()"></i>
        </div>

        <div id="messages" style="height:60vh;overflow:auto">
            <div id="reactionPicker" style="display:none; position:fixed; bottom:10px;"></div>
        </div>

        <input id="msg" class="form-control">
        <button onclick="send()" class="btn btn-success w-100">送信</button>

    </div>

    <!-- ================= 設定 ================= -->
    <div id="settingsPage" class="hidden full p-3">

        <i class="bi bi-arrow-left" onclick="closeSettings()"></i>
        <h1>設定</h1>

        <p>テーマカラー</p>
        <select id="theme" class="form-select">
            <option>ライト</option>
            <option>ダーク</option>
            <option>自動</option>
            <option>カスタム</option>
        </select>

        <p>アクセントカラー</p>
        <input id="accent" data-coloris>

        <p>背景</p>
        <input data-coloris>
        <input type="file">

        <p>角丸度</p>
        <input id="radius" type="range">

        <p>あなたのPINコード</p>
        <div id="myPinSettings" class="fw-bold"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="public/supabase.js"></script>
    <script src="public/app.js"></script>
    <script>
        async function logout() {
            await sb.auth.signOut();
            location.href = "public/login.html";
        }
    </script>
</body>

</html>
