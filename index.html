<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャット</title>

    <link rel="manifest" href="manifest.json">


    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@migliori/universal-icon-picker@1.1.10/assets/stylesheets/universal-icon-picker.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="public/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/platform/1.3.6/platform.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emoji-button@2.2.2/dist/index.min.js"></script>

    <script
        src="https://cdn.jsdelivr.net/npm/@migliori/universal-icon-picker@1.1.10/assets/js/universal-icon-picker.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.11.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>

    <style>
        .noselect {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>

<body>

    <div class="container py-3">
        <div id="chatListPage">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h1>チャット</h1>
                <div>
                    <button class="btn btn-outline-primary me-3" onclick="openProfile()">
                        <i class="bi bi-person-gear"></i>
                    </button>
                    <button class="btn btn-outline-success me-3" onclick="createGroup()">
                        <i class="bi bi-people"></i>
                    </button>
                    <button class="btn btn-outline-danger me-3" onclick="openAdd()">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" id="search" class="form-control" placeholder="検索">
            </div>
            <div id="chatList"></div>
        </div>

        <div id="chatRoom" style="display:none">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                    <button class="btn btn-light" onclick="backList()">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <span id="chatUser" class="fw-bold ms-2"></span>
                </div>

                <div id="roomActionButtons">
                    <button id="groupQrBtn" class="btn btn-light me-2" onclick="showQR()">
                        <i class="bi bi-qr-code"></i>
                    </button>

                    <button id="groupScanBtn" class="btn btn-light me-2" onclick="scanQR()">
                        <i class="bi bi-camera"></i>
                    </button>

                    <button class="btn btn-light me-2" onclick="openSettings()">
                        <i class="bi bi-gear"></i>
                    </button>

                    <button id="groupAddBtn" class="btn btn-light me-2" onclick="addMemberToGroup()">
                        <i class="bi bi-person-plus"></i>
                    </button>

                    <button id="deleteBtn" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash3"></i>
                    </button>

                    <button id="groupLeaveBtn" class="btn btn-danger btn-sm" onclick="leaveGroup()">
                        <i class="bi bi-arrow-bar-left"></i>
                    </button>
                </div>
            </div>

            <div id="messages"></div>

            <div class="input-group mt-2">
                <div class="d-flex align-items-center gap-2">
                    <label for="cameraInput" class="btn btn-light m-0">
                        <i class="bi bi-paperclip"></i>
                    </label>
                    <input type="file" id="fileInput" class="form-control" style="display:none">
                    <label for="cameraInput" class="btn btn-light m-0">
                        <i class="bi bi-camera"></i>
                    </label>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
                </div>
                <textarea id="msgInput" class="form-control" rows="1" placeholder="メッセージを入力"></textarea>
                <button onclick="sendMsg()" class="btn btn-success">
                    <i class="bi bi-send"></i>
                </button>
            </div>
        </div>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }

        const input = document.getElementById("msgInput");

        input.addEventListener("input", () => {
            input.style.height = "auto";
            input.style.height = input.scrollHeight + "px";
        });
    </script>

    <script src="public/app.js"></script>
</body>

</html>
