<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>チャット</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/fontawesome-iconpicker/3.2.0/js/fontawesome-iconpicker.min.js"></script>

    <link rel="stylesheet" href="public/style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-emoji-picker@0.2.2/js/jquery.emojis.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

    <div class="container py-3">

        <!-- ===== チャット一覧 ===== -->
        <div id="chatListPage">

            <div class="d-flex justify-content-between align-items-center mb-2">
                <h1>チャット</h1>
                <div>
                    <button class="btn btn-success me-2" onclick="createGroup()">
                        <i class="bi bi-people"></i>
                    </button>
                    <button class="btn btn-primary" onclick="openAdd()">
                        <i class="bi bi-plus"></i>
                    </button>
                </div>
            </div>

            <!-- 検索 -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" id="search" class="form-control" placeholder="検索">
            </div>

            <!-- リスト -->
            <div id="chatList"></div>

        </div>


        <!-- ===== トーク画面 ===== -->
        <div id="chatRoom" style="display:none">

            <!-- ヘッダー -->
            <div class="d-flex justify-content-between align-items-center mb-2">

                <div>
                    <button class="btn btn-light" onclick="backList()">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <span id="chatUser" class="fw-bold ms-2"></span>
                </div>

                <div>
                    <button class="btn btn-light me-2" onclick="showQR()">
                        <i class="bi bi-qr-code"></i>
                    </button>
                    <button class="btn btn-light me-2" onclick="scanQR()">
                        <i class="bi bi-camera"></i>
                    </button>
                    <button class="btn btn-light" onclick="openSettings()">
                        <i class="bi bi-gear"></i>
                    </button>
                </div>

            </div>

            <!-- メッセージ -->
            <div id="messages"></div>

            <!-- 入力欄 -->
            <div class="input-group mt-2">
                <input id="msgInput" class="form-control" placeholder="メッセージを入力">

                <input type="file" id="fileInput" class="form-control">

                <button onclick="sendMsg()" class="btn btn-success">
                    送信
                </button>
            </div>

        </div>

    </div>


    <!-- JS -->
    <script src="public/app.js"></script>

</body>

</html>
