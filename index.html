<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャット</title>

    <link rel="manifest" href="/manifest.json">


    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@migliori/universal-icon-picker@1.1.10/assets/stylesheets/universal-icon-picker.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="public/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/platform/1.3.6/platform.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emoji-button@2.2.2/dist/index.min.js"></script>

    <script
        src="https://cdn.jsdelivr.net/npm/@migliori/universal-icon-picker@1.1.10/assets/js/universal-icon-picker.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>

    <style>
        .noselect {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>

<body>

    <div class="container py-3">
        <div id="chatListPage">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h1>チャット</h1>
                <div>
                    <button class="btn btn-outline-dark me-3" onclick="addQR()">
                        <i class="bi bi-qr-code"></i>
                    </button>
                    <button class="btn btn-outline-success me-3" onclick="createGroup()">
                        <i class="bi bi-people"></i>
                    </button>
                    <button class="btn btn-outline-danger me-3" onclick="openAdd()">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" id="search" class="form-control" placeholder="検索">
            </div>
            <div id="chatList"></div>
        </div>

        <div id="chatRoom" style="display:none">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                    <button class="btn btn-light" onclick="backList()">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <span id="chatUser" class="fw-bold ms-2"></span>
                </div>
                <div>
                    <button class="btn btn-light me-2" onclick="showQR()">
                        <i class="bi bi-qr-code"></i>
                    </button>

                    <button class="btn btn-light me-2" onclick="scanQR()">
                        <i class="bi bi-camera"></i>
                    </button>

                    <button class="btn btn-light me-2" onclick="openSettings()">
                        <i class="bi bi-gear"></i>
                    </button>

                    <button class="btn btn-light me-2" onclick="addMemberToGroup()">
                        <i class="bi bi-person-plus"></i>
                    </button>

                    <button class="btn btn-danger" onclick="leaveGroup()">
                        <i class="bi bi-arrow-bar-left"></i>
                    </button>
                </div>
            </div>

            <div id="messages"></div>

            <div class="input-group mt-2">
                <input type="file" id="fileInput" class="form-control">
                <input id="msgInput" class="form-control" placeholder="メッセージを入力">
                <button onclick="sendMsg()" class="btn btn-success">
                    <i class="bi bi-send"></i>
                </button>
            </div>
        </div>
    </div>
    <script src="public/app.js"></script>
</body>

</html>
