<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>サインアップ | OSUMU Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #eee;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <section class="vh-100">
        <div class="container h-100 d-flex justify-content-center align-items-center col-lg-12 col-xl-11 card text-black"
            style="border-radius: 25px;">
            <div class="card-body p-md-5 row justify-content-center">
                <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                    <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">サインアップ</p>
                    <form class="mx-1 mx-md-4">
                        <div class="d-flex flex-row align-items-center mb-4">
                            <i class="bi bi-person-circle me-3" style="font-size:25px"></i>
                            <div data-mdb-input-init class="form-outline flex-fill mb-0">
                                <input type="text" id="su_name" class="form-control" placeholder="名前を入力" />
                            </div>
                        </div>

                        <div class="d-flex flex-row align-items-center mb-4">

                            <svg class="me-3" xmlns="http://www.w3.org/2000/svg" width="25" height="25"
                                fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                                <path fill-rule="evenodd"
                                    d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4m0 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3" />
                            </svg>
                            <div data-mdb-input-init class="form-outline flex-fill mb-0">
                                <input type="password" id="su_pass" class="form-control" placeholder="パスワードを入力" />
                            </div>
                        </div>

                        <div class="d-flex flex-row align-items-center mb-4">
                            <i class="bi bi-key me-3" style="font-size:25px"></i>
                            <div data-mdb-input-init class="form-outline flex-fill mb-0">
                                <input type="password" id="su_pass2" class="form-control" placeholder="もう一度パスワードを入力" />
                            </div>
                        </div>

                        <div class="form-check d-flex justify-content-center mb-5" style="background-color:#e4e1e1;">
                            <input class="form-check-input me-2" type="checkbox" value="" id="su_cb" />
                            <label class="form-check-label">
                                すべての <a href="terms.html">利用規約</a> に同意します
                            </label>
                        </div>

                        <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                            <button type="button" data-mdb-button-init data-mdb-ripple-init
                                class="btn btn-primary btn-lg" onclick="signup()">サインアップ</button>
                        </div>

                    </form>

                </div>
                <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                    <img src="image.png" class="img-fluid" alt="image" style="width: 1050px">
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
        src="data:text/javascript;base64,KCgpID0+IHsKICB3aW5kb3cuY2xpZW50ID0gc3VwYWJhc2UuY3JlYXRlQ2xpZW50KCJodHRwczovL3JydXhwcXV4dGR5emhoY3J1cmxqLnN1cGFiYXNlLmNvIiwgInNiX3B1Ymxpc2hhYmxlX2RpT0lQbnlFaTFWVTFSRTh4ZUtwQndfNmFza1A1LUEiKTsKfSkoKQ=="></script>
    <script>
        const client = supabase.createClient("https://acebtnoxoijpurwvpisr.supabase.co", "sb_publishable_zgLg3lODrTUNc2JDa1aoXA_epBmQ3Zx");

        async function signup() {
            const name = document.getElementById("su_name").value.trim();
            const pass = document.getElementById("su_pass").value;
            const pass2 = document.getElementById("su_pass2").value;
            const cb = document.getElementById("su_cb").checked;

            if (!name || !pass || !pass2) {
                Swal.fire("未入力", "入力してください", "error");
                return;
            }

            if (pass !== pass2) {
                Swal.fire("不一致", "パスワード不一致", "error");
                return;
            }

            if (!cb) {
                Swal.fire({
                    title: "利用規約",
                    html: `利用規約に同意してください<br><button class="btn btn-link" onclick="location.href='terms.html'">利用規約</button>`,
                    icon: "error"
                });
                return;
            }

            const email = name + "@user.localhost";

            // ===== サインアップ =====
            const { data, error } = await client.auth.signUp({
                email,
                password: pass
            });

            if (error) {
                if (error.message.includes("Invalid login credentials")) {
                    Swal.fire({
                        title: "エラー",
                        html: `ユーザーがいません。`,
                        icon: "error"
                    });
                }
                if (error.message.includes("Password should be at least")) {
                    Swal.fire({
                        title: "エラー",
                        html: `パスワードは8文字以上必要です。`,
                        icon: "error"
                    });
                }
                if (error.message.includes("User already registered")){
                    Swal.fire({
                        title: "エラー",
                        html: `このユーザーは既に存在します。`,
                        icon: "error"
                    });
                }
                Swal.fire("エラー", error.message, "error");
                return;
            }

            const user = data.user;

            const pin = String(Math.floor(Math.random() * 1000000)).padStart(6, "0");

            await client.from("profiles").insert({
                id: user.id,
                username: name,
                name: name,
                pin: pin
            });

            // ===== 保存 =====
            localStorage.setItem("username", name);

            // ===== PIN表示 =====
            Swal.fire({
                title: "登録完了",
                html: `
            登録が完了しました！<br><br>
            <b>あなたのPIN</b><br>
            <h2 style="color:green">${pin}</h2>
            <button class="btn btn-primary mt-2" onclick="navigator.clipboard.writeText('${pin}')">
              コピー
            </button>
            <small>重要な情報です。これがないとチャットができません。<br><strong>必ず</strong>どこかにメモしておいてください。</small>
        `,
                icon: "success"
            }).then(() => {
                location.href = "login.html";
            });
        }
    </script>
</body>

</html>
