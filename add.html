<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <script>
        const client = supabase.createClient("https://acebtnoxoijpurwvpisr.supabase.co", "sb_publishable_zgLg3lODrTUNc2JDa1aoXA_epBmQ3Zx");

        window.onload = async () => {
            const params = new URLSearchParams(location.search);
            const base64 = params.get("data");

            if (!base64) {
                Swal.fire("データがありません");
                return;
            }

            let payload;
            try {
                payload = JSON.parse(atob(base64));
            } catch {
                Swal.fire("データが壊れています");
                return;
            }

            const { data: session } = await client.auth.getSession();
            if (!session.session) {
                Swal.fire("ログインしてください");
                return;
            }

            const user = session.session.user;

            if (payload.to) {
                await addByPin(payload.to, user);
                return;
            }

            if (payload.room_id) {
                await joinRoom(payload.room_id, user);
                return;
            }

            if (payload.from) {
                await addByPin(payload.from, user);
                return;
            }

            Swal.fire("不正なデータです");
        };

        async function addByPin(pin, user) {
            const { data } = await client
                .from("profiles")
                .select("*")
                .eq("pin", pin)
                .single();

            if (!data) {
                Swal.fire("ユーザーが見つかりません");
                return;
            }

            const { data: room } = await client
                .from("rooms")
                .insert({ name: data.name })
                .select()
                .single();

            await client.from("room_members").insert([
                { room_id: room.id, user_id: user.id },
                { room_id: room.id, user_id: data.id }
            ]);

            Swal.fire("追加しました").then(() => location.href = "/");
        }

        async function joinRoom(roomId, user) {
            await client.from("room_members").insert({
                room_id: roomId,
                user_id: user.id
            });

            Swal.fire("参加しました").then(() => location.href = "/");
        }
    </script>

</body>

</html>
