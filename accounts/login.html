<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン | OSUMU Chat</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #eee;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <section class="vh-100">
        <div class="container h-100 d-flex justify-content-center align-items-center col-lg-12 col-xl-11 card text-black"
            style="border-radius: 25px;">
            <div class="card-body p-md-5 row justify-content-center">
                <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                    <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">ログイン</p>
                    <form class="mx-1 mx-md-4" id="loginForm">
                        <div class="d-flex flex-row align-items-center mb-4">
                            <i class="bi bi-person-circle me-3" style="font-size:25px"></i>
                            <div data-mdb-input-init class="form-outline flex-fill mb-0">
                                <input type="text" id="li_name" class="form-control" placeholder="名前を入力" />
                            </div>
                        </div>

                        <div class="d-flex flex-row align-items-center mb-4">

                            <svg class="me-3" xmlns="http://www.w3.org/2000/svg" width="25" height="25"
                                fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                                <path fill-rule="evenodd"
                                    d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4m0 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3" />
                            </svg>
                            <div data-mdb-input-init class="form-outline flex-fill mb-0">
                                <input type="password" id="li_pass" class="form-control" placeholder="パスワードを入力" />
                            </div>
                        </div>

                        <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                            <button type="button" data-mdb-button-init data-mdb-ripple-init
                                class="btn btn-primary btn-lg" onclick="login()">ログイン</button>
                        </div>
                        <p class="mt-3 text-center">
                            アカウントを持っていませんか?
                            <a href="signup.html">サインアップ</a>
                        </p>

                    </form>

                </div>
                <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                    <img src="image.png" class="img-fluid" alt="image" style="width: 1050px">
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const client = supabase.createClient("https://acebtnoxoijpurwvpisr.supabase.co", "sb_publishable_zgLg3lODrTUNc2JDa1aoXA_epBmQ3Zx");

        async function login() {
            const name = document.getElementById("li_name").value.trim();
            const pass = document.getElementById("li_pass").value;

            if (!name || !pass) {
                Swal.fire({
                    title: "エラー",
                    text: "入力してください",
                    icon: "error"
                });
                return;
            }

            const email = name + "@user.localhost";

            const { error } = await client.auth.signInWithPassword({
                email,
                password: pass
            });

            if (error) {
                if (error.message.includes("Invalid login credentials")) {
                    Swal.fire({
                        title: "エラー",
                        html: `ユーザーがいません。`,
                        icon: "error"
                    });
                    return;
                }
                Swal.fire({
                    title: "ログイン失敗",
                    text: error.message,
                    icon: "error"
                });
                return;
            }

            localStorage.setItem("login", "true");
            localStorage.setItem("username", name);

            Swal.fire({
                title: "ログイン成功",
                icon: "success"
            }).then(() => {
                location.href = "../index.html";
            });
        }
    </script>
</body>

</html>
